name: Hero

on:
  # run automatically every 24 hours
  schedule:
    - cron: "1 */1 * * *" 
  
  # allows to manually run the job at any time
  workflow_dispatch:
  
  # run on every push on the main branch
  push:
    branches:
    - main

permissions:
  contents: write

concurrency:
  group: render-hero-test
  cancel-in-progress: true

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Playwright (Chromium)
        run: |
          set -euxo pipefail
          npm init -y
          npm i -D playwright
          npx playwright install --with-deps chromium

      - name: Render assets/hero.html -> assets/images/hero.png (transparent)
        run: |
          set -euxo pipefail
          mkdir -p assets/images
          node - <<'NODE'
          const { chromium } = require('playwright');
          const path = require('path');
          const fs = require('fs');

          (async () => {
            const heroFile = path.resolve('assets/hero.html');
            if (!fs.existsSync(heroFile)) {
              console.error('Missing file:', heroFile);
              process.exit(1);
            }

            const browser = await chromium.launch();
            const page = await browser.newPage({
              viewport: { width: 1400, height: 520 },
              deviceScaleFactor: 2
            });

            await page.goto('file://' + heroFile, { waitUntil: 'networkidle' });

            // Ensure the "page" itself is transparent (prevents white flattening)
            await page.addStyleTag({
              content: `
                html, body { background: transparent !important; margin: 0 !important; padding: 0 !important; }
              `
            });

            const hero = await page.$('#hero');
            if (hero) {
              await hero.screenshot({
                path: 'assets/images/hero.png',
                omitBackground: true
              });
            } else {
              await page.screenshot({
                path: 'assets/images/hero.png',
                fullPage: true,
                omitBackground: true
              });
            }

            await browser.close();
            console.log('OK: hero.png created with transparent background');
          })();
          NODE

      - name: Upload hero.png artifact (debug)
        uses: actions/upload-artifact@v4
        with:
          name: hero-png
          path: assets/images/hero.png
          if-no-files-found: error

      - name: Commit image if changed
        run: |
          set -euxo pipefail

          # Stage the generated file first (handles new/untracked files)
          git add assets/images/hero.png

          # If nothing is staged, do nothing
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git commit -m "chore(readme): render hero image [skip ci]"
          git push
